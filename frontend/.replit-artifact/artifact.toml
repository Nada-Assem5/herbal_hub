kind = "web"
previewPath = "/"
title = "Pure Botanica"
version = "1.0.0"
id = "artifacts/pure-botanica"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20052

[services.development]
run = "pnpm --filter @workspace/pure-botanica run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pure-botanica", "run", "build" ]
serve = "static"
publicDir = "artifacts/pure-botanica/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20052"
BASE_PATH = "/"
